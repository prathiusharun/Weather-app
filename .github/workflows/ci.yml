name: CI/CD Pipeline

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: npx prisma generate # Critical for Next.js 16/Prisma 7
      - run: npm test
      - run: npm run build
        env:
          # Vercel handles these in production, but we add 
          # dummy values here just to let the build finish.
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          OPENWEATHER_API_KEY: "dummy_key"